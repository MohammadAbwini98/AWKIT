<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 2: Specter — Luminous Offset-Brick S -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Specter luminous offset-brick S application icon</title>
  <desc id="description">
    A violet frosted-glass squircle containing a bold geometric S built from rounded rectangular blocks.
  </desc>

  <defs>
    <path
      id="tile-shape"
      d="M167 97H345C389.5 97 415 122.5 415 167V345C415 389.5 389.5 415 345 415H167C122.5 415 97 389.5 97 345V167C97 122.5 122.5 97 167 97Z"
    />

    <clipPath id="tile-clip">
      <path d="M167 97H345C389.5 97 415 122.5 415 167V345C415 389.5 389.5 415 345 415H167C122.5 415 97 389.5 97 345V167C97 122.5 122.5 97 167 97Z" />
    </clipPath>

    <radialGradient id="violet-field" cx="0.22" cy="0.14" r="0.94">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.84" />
      <stop offset="0.24" stop-color="#8b5cf6" stop-opacity="0.62" />
      <stop offset="0.54" stop-color="#7c3aed" stop-opacity="0.30" />
      <stop offset="1" stop-color="#0e1016" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="depth-shade" x1="0.18" y1="0.08" x2="0.88" y2="0.94">
      <stop offset="0" stop-color="#0e1016" stop-opacity="0" />
      <stop offset="0.56" stop-color="#0e1016" stop-opacity="0.12" />
      <stop offset="1" stop-color="#0e1016" stop-opacity="0.78" />
    </linearGradient>

    <linearGradient id="glass-sheen" x1="0.06" y1="0.02" x2="0.82" y2="0.92">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24" />
      <stop offset="0.26" stop-color="#ffffff" stop-opacity="0.09" />
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.025" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="specter-gradient" x1="168" y1="154" x2="344" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6" />
      <stop offset="0.38" stop-color="#a78bfa" />
      <stop offset="0.76" stop-color="#f3f0ff" />
      <stop offset="1" stop-color="#f3f1f8" />
    </linearGradient>

    <filter id="tile-shadow" x="60" y="60" width="392" height="410" filterUnits="userSpaceOnUse">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="14"
        flood-color="#0e1016"
        flood-opacity="0.72"
      />
    </filter>

    <filter id="soft-bloom" x="74" y="72" width="360" height="360" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="25" />
    </filter>

    <filter id="mark-glow" x="142" y="128" width="230" height="264" filterUnits="userSpaceOnUse">
      <feDropShadow
        dx="0"
        dy="3"
        stdDeviation="6"
        flood-color="#8b5cf6"
        flood-opacity="0.42"
      />
    </filter>
  </defs>

  <g id="tile">
    <path
      d="M167 97H345C389.5 97 415 122.5 415 167V345C415 389.5 389.5 415 345 415H167C122.5 415 97 389.5 97 345V167C97 122.5 122.5 97 167 97Z"
      fill="#0e1016"
      filter="url(#tile-shadow)"
    />

    <g clip-path="url(#tile-clip)">
      <rect x="97" y="97" width="318" height="318" fill="#0e1016" />
      <rect x="97" y="97" width="318" height="318" fill="url(#violet-field)" />

      <ellipse
        cx="168"
        cy="133"
        rx="124"
        ry="92"
        fill="#a78bfa"
        opacity="0.18"
        filter="url(#soft-bloom)"
      />

      <rect x="97" y="97" width="318" height="318" fill="url(#depth-shade)" />
    </g>
  </g>

  <g id="glass" clip-path="url(#tile-clip)">
    <rect x="97" y="97" width="318" height="318" fill="url(#glass-sheen)" />

    <path
      d="M108 343V170C108 130.5 130.5 108 170 108H343"
      fill="none"
      stroke="#ffffff"
      stroke-width="3"
      stroke-linecap="round"
      opacity="0.17"
    />

    <path
      d="M170 405H342C378.5 405 405 378.5 405 342"
      fill="none"
      stroke="#0e1016"
      stroke-width="3"
      stroke-linecap="round"
      opacity="0.48"
    />
  </g>

  <g
    id="specter-mark"
    fill="url(#specter-gradient)"
    stroke="#f3f1f8"
    stroke-width="1.4"
    stroke-opacity="0.30"
    filter="url(#mark-glow)"
  >
    <!-- Three-brick top bar -->
    <rect x="168" y="154" width="46" height="34" rx="7" />
    <rect x="224" y="154" width="46" height="34" rx="7" />
    <rect x="280" y="154" width="46" height="34" rx="7" />

    <!-- Upper-left turn -->
    <rect x="168" y="198" width="46" height="34" rx="7" />

    <!-- Three-brick middle bar, offset to the right -->
    <rect x="186" y="242" width="46" height="34" rx="7" />
    <rect x="242" y="242" width="46" height="34" rx="7" />
    <rect x="298" y="242" width="46" height="34" rx="7" />

    <!-- Lower-right turn -->
    <rect x="298" y="286" width="46" height="34" rx="7" />

    <!-- Three-brick bottom bar -->
    <rect x="186" y="330" width="46" height="34" rx="7" />
    <rect x="242" y="330" width="46" height="34" rx="7" />
    <rect x="298" y="330" width="46" height="34" rx="7" />
  </g>
</svg>
