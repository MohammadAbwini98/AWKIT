<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Site — Form</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card wide">
      <h1>Customer Form</h1>
      <form method="POST" action="/submit">
        <div class="grid">
          <div class="field">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" type="text" required />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" type="text" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" />
          </div>
          <div class="field">
            <label for="age">Age</label>
            <input id="age" name="age" type="number" />
          </div>
          <div class="field">
            <label for="salary">Salary</label>
            <input id="salary" name="salary" type="number" step="0.01" />
          </div>
          <div class="field">
            <label for="birthDate">Birth date</label>
            <input id="birthDate" name="birthDate" type="date" />
          </div>
          <div class="field">
            <label for="country">Country</label>
            <select id="country" name="country">
              <option value="JO">JO</option>
              <option value="SA">SA</option>
              <option value="AE">AE</option>
              <option value="US">US</option>
            </select>
          </div>
          <div class="field">
            <label for="accountType">Account type</label>
            <select id="accountType" name="accountType">
              <option value="PERSONAL">PERSONAL</option>
              <option value="BUSINESS">BUSINESS</option>
              <option value="CORPORATE">CORPORATE</option>
            </select>
          </div>
          <div class="field">
            <label for="skills">Skills</label>
            <select id="skills" name="skills" multiple size="3">
              <option value="playwright">Playwright</option>
              <option value="typescript">TypeScript</option>
              <option value="testing">Testing</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <fieldset>
          <legend>Gender</legend>
          <label class="inline"><input id="genderMale" name="gender" type="radio" value="MALE" /> Male</label>
          <label class="inline"><input id="genderFemale" name="gender" type="radio" value="FEMALE" /> Female</label>
        </fieldset>

        <fieldset>
          <legend>Interests</legend>
          <label class="inline"><input id="interestAutomation" name="interestAutomation" type="checkbox" value="yes" /> Automation</label>
          <label class="inline"><input id="interestTesting" name="interestTesting" type="checkbox" value="yes" /> Testing</label>
        </fieldset>

        <label class="inline">
          <input id="acceptTerms" name="acceptTerms" type="checkbox" value="yes" />
          I accept the terms
        </label>

        <div class="field">
          <label for="attachment">Attachment</label>
          <input id="attachment" name="attachment" type="file" />
        </div>

        <div class="actions">
          <button id="submitButton" type="submit">Submit</button>
          <button id="resetButton" type="reset">Reset</button>
        </div>
      </form>

      <!-- Route Change / new-tab test scenario -->
      <p class="route-change-block">
        <a id="openNewTabButton" href="/details" target="_blank" rel="noopener">Open Details In New Tab</a>
      </p>
    </main>
  </body>
</html>
