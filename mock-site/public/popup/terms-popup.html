<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Terms Popup</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Terms Popup</h1>
      <label>
        <input type="checkbox" id="agree-checkbox" data-testid="agree-checkbox" />
        I agree to the terms
      </label>
      <br/><br/>
      <button id="accept-button" data-testid="accept-button" onclick="acceptTerms()">Accept Terms</button>
    </main>
    <script>
      function acceptTerms() {
        if (window.opener) {
          window.opener.postMessage({ type: "terms-accepted" }, "*");
        }
        window.close();
      }
    </script>
  </body>
</html>
