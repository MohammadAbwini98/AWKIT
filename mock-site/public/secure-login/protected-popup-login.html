<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protected Popup Login — AWTKIT Feature Test Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card" data-testid="protected-popup-login-page">
      <h1>Protected popup login</h1>
      <p>
        This scenario opens a <strong>protected login in a popup window</strong> (e.g. an external
        identity provider). AWKIT must detect the protected popup and pause instead of automating it.
      </p>

      <button id="openPopup" type="button" data-testid="open-popup" onclick="openProtectedPopup()">
        Open Protected Login Popup
      </button>

      <p id="authStatus" data-testid="auth-status" role="status">Not authenticated</p>

      <p><a href="/">Back to Feature Test Lab</a></p>
    </main>

    <script>
      function openProtectedPopup() {
        window.open("/mock/protected-popup-login-popup", "protectedLoginPopup", "width=520,height=640");
      }
      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "awtkit-manual-login-complete") {
          var status = document.getElementById("authStatus");
          status.textContent = "Authenticated via manual popup login";
          status.setAttribute("data-authenticated", "true");
        }
      });
    </script>
  </body>
</html>
