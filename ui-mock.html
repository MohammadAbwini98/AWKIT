<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWKIT Dark Premium SaaS Mock</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
      /* Dark Premium Base Colors */
      --bg-base: #0b0f19;       /* Deep navy/black for the app background and canvas */
      --bg-surface: #151b2b;    /* Slightly lighter for panels and sidebars */
      --bg-card: #1e2638;       /* Lighter still for cards and nodes */
      --bg-hover: #2a344a;

      /* Accents (Purple/Blue) */
      --accent-primary: #8b5cf6; /* Vibrant Purple */
      --accent-primary-hover: #a855f7;
      --accent-secondary: #3b82f6; /* Blue for secondary actions */
      
      /* Typography */
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;

      /* Borders & Shadows */
      --border-color: rgba(255, 255, 255, 0.08);
      --border-highlight: rgba(255, 255, 255, 0.15);
      
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.7), 0 4px 10px -2px rgba(0, 0, 0, 0.5);
      --glow-active: 0 0 15px rgba(139, 92, 246, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Layout */
    .sidebar {
      width: 260px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px 20px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    .sidebar-nav {
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      padding: 10px 16px;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent-primary);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .canvas-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .canvas {
      flex: 1;
      background: var(--bg-base);
      background-image: radial-gradient(var(--border-highlight) 1px, transparent 1px);
      background-size: 24px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover {
      background: var(--accent-primary-hover);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-outline:hover {
      background: var(--bg-hover);
      border-color: var(--border-highlight);
    }

    /* Flow Nodes */
    .node {
      position: absolute;
      background: var(--bg-card);
      width: 260px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .node:hover {
      border-color: var(--border-highlight);
    }

    .node.active {
      border-color: var(--accent-primary);
      box-shadow: var(--glow-active), var(--shadow-lg);
    }

    .node-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
    }

    .node-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--accent-secondary);
    }

    .node-body {
      padding: 16px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }
    
    .node-port {
      width: 12px;
      height: 12px;
      background: var(--bg-card);
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .node-port.right { right: -6px; border-color: var(--accent-primary); background: var(--bg-base); }
    .node-port.left { left: -6px; }

    /* Panel */
    .panel {
      width: 320px;
      background: var(--bg-surface);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 16px;
    }

    .panel-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .form-input {
      background: var(--bg-base);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent-primary);
    }

  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"></div>
      WebFlow Studio
    </div>
    <div class="sidebar-nav">
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        Dashboard
      </div>
      <div class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        Flows
      </div>
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        Workflows
      </div>
    </div>
  </div>

  <!-- Main Canvas Area -->
  <div class="canvas-container">
    <div class="topbar">
      <div style="font-weight: 500;">Editing: Checkout Flow</div>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-outline">Test Run</button>
        <button class="btn btn-primary">Save Changes</button>
      </div>
    </div>
    <div class="canvas">
      
      <!-- Mock Connection Line -->
      <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
        <path d="M 280 200 C 350 200, 350 300, 420 300" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-dasharray="4 4" />
      </svg>

      <!-- Flow Node 1 -->
      <div class="node" style="top: 130px; left: 20px;">
        <div class="node-port right"></div>
        <div class="node-header">
          <div class="node-icon" style="background: var(--text-muted);"></div>
          Start
        </div>
        <div class="node-body">
          Entry point for the automation flow.
        </div>
      </div>

      <!-- Flow Node 2 (Active) -->
      <div class="node active" style="top: 230px; left: 420px;">
        <div class="node-port left"></div>
        <div class="node-port right"></div>
        <div class="node-header">
          <div class="node-icon"></div>
          Navigate to URL
        </div>
        <div class="node-body">
          <div style="margin-bottom: 8px;">Goes to target checkout page and waits for load.</div>
          <div style="display:inline-block; padding: 4px 8px; background: rgba(59, 130, 246, 0.1); color: var(--accent-secondary); border-radius: 4px; font-size: 11px; font-weight: 600;">Action</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Right Panel -->
  <div class="panel">
    <div class="panel-header">
      Node Properties
    </div>
    <div class="panel-content">
      <div class="form-group">
        <label class="form-label">Action Type</label>
        <div class="form-input" style="background: var(--bg-card); cursor: not-allowed; color: var(--text-muted);">Navigate</div>
      </div>
      <div class="form-group">
        <label class="form-label">Target URL</label>
        <input class="form-input" type="text" value="https://example.com/checkout">
      </div>
      <div class="form-group">
        <label class="form-label">Timeout (ms)</label>
        <input class="form-input" type="number" value="30000">
      </div>
    </div>
  </div>

</body>
</html>
