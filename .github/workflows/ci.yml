name: CI

# Validate that the project typechecks and bundles cleanly.
# Runs on pushes to main and on all pull requests targeting main.
# No secrets are required and no artifacts are uploaded.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only token: this workflow never writes to the repo or uses secrets.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & Build
    # SpecterStudio is a Windows desktop app; run CI on the target OS so the
    # bundling step matches the documented developer commands.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          # Node 20 LTS satisfies the >=20 requirement noted in docs/ai/TESTING.md.
          node-version: 20
          cache: npm

      - name: Install dependencies (clean, from lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (typecheck + renderer/main/preload bundles)
        run: npm run build
