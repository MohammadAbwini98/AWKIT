<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
    <title>SpecterStudio</title>
    <style>
      /* Offline-first: no remote fonts/assets. System sans (Arial ≈ Helvetica Neue). */
      :root { --bg: #0e1016; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
      #stage { display: block; width: 100vw; height: 100vh; }
      /* Waiting spinner — hidden until the splash has played one full round and the app
         still needs time to load. Sits in the bottom-right corner, over the brief frame. */
      #spinner {
        position: fixed;
        right: 22px;
        bottom: 18px;
        width: 22px;
        height: 22px;
        opacity: 0;
        transition: opacity 280ms ease;
        pointer-events: none;
        z-index: 10;
      }
      #spinner .ring {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2.5px solid rgba(247, 246, 251, 0.16);
        border-top-color: #a78bfa;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="spinner" aria-hidden="true"><div class="ring"></div></div>
    <script>
      (() => {
        "use strict";
        // ---- Virtual design space (matches reference aspect 1600x1200, 4:3) ----
        const VW = 1600, VH = 1200;
        const DURATION = 13.716667; // exact loop length of the reference clip
        const FONT = '"Helvetica Neue", Helvetica, Arial, "Segoe UI", sans-serif';

        // ---- Palette: strict high-contrast monochrome + whisper of project violet ----
        const COL = {
          bg: "#0e1016",
          line: "rgba(247,246,251,0.94)",    // crisp white grid strokes
          lineSoft: "rgba(247,246,251,0.68)",
          word: "#f8f7fc",                    // display wordmark (near pure white)
          body: "#c2bdcf",                    // paragraph body copy
          muted: "#8f8a9c",                   // credits
          accent: "#a78bfa",                  // violet accent (counter)
          glow: "rgba(124,58,237,0.08)"       // very subtle violet radial glow
        };

        const WORD1 = "SPECTER";
        const WORD2 = "STUDIO";
        const COUNTER = "1.0.7";
        const TAGLINE = ["VISUAL AUTOMATION", "PLATFORM"];
        const PARA = [
          "Specter Studio is a visual automation platform designed to test complex web application scenarios through configurable workflows. Modular actions, conditions, validations, and reusable components can be combined to reproduce real user journeys and verify application behavior across different testing scenarios.",
          "The principle of adaptability is embedded throughout the system. Specter Studio provides a flexible visual workspace where workflows can be created, configured, reused, and expanded to support evolving automation and testing requirements."
        ];
        const CREDITS = [
          "Year: 2026",
          "Scope: Automation platform concept, workflow design and desktop application",
          "System: Specter Studio",
          "Design: Mohammad Abwini",
          "Organization: Arab Bank — Limited",
          "Version: 1.0.7"
        ];

        // ---- Easing ----
        const easeInOut = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
        const lerp = (a, b, f) => a + (b - a) * f;

        // A scene is a full parametric layout. Every numeric prop is interpolated.
        // words: { anchor:'L'|'C'|'R', ax, y, size, a }  (ax is the anchor x; a = alpha)
        // grids: { x, y, w, h, cols, rows, a }
        // para/cred/counter/tagline carry alpha (and para its box).
        const M = 70; // outer margin
        const mk = (o) => o;
        // Word `y` is the text BASELINE; each word is placed just ABOVE its grid's top edge.
        const SCENES = [
          // t=0.00 — FORMAT A: wide landscape shelf-grids (~10×3), words spread L/R
          { t: 0.00, w1: mk({ anchor:"L", ax:M,       y:183, size:100, a:1 }),
                     gA: mk({ x:M, y:205, w:VW-2*M, h:210, cols:10, rows:3, a:1 }),
                     w2: mk({ anchor:"R", ax:VW-M,   y:603, size:100, a:1 }),
                     gB: mk({ x:M, y:625, w:VW-2*M, h:210, cols:10, rows:3, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 },
          // t=1.60 — collapsing/reflowing toward centre, fewer columns
          { t: 1.60, w1: mk({ anchor:"C", ax:VW/2, y:188, size:88, a:1 }),
                     gA: mk({ x:VW/2-230, y:210, w:460, h:250, cols:4, rows:2, a:1 }),
                     w2: mk({ anchor:"C", ax:VW/2, y:628, size:88, a:1 }),
                     gB: mk({ x:VW/2-230, y:650, w:460, h:250, cols:4, rows:2, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 },
          // t=3.00 — MINIMAL: a single small centred 2×2 grid, type faded out
          { t: 3.00, w1: mk({ anchor:"C", ax:VW/2, y:300, size:60, a:0 }),
                     gA: mk({ x:VW/2-130, y:500, w:260, h:260, cols:2, rows:2, a:1 }),
                     w2: mk({ anchor:"C", ax:VW/2, y:300, size:60, a:0 }),
                     gB: mk({ x:VW/2-130, y:500, w:260, h:260, cols:2, rows:2, a:0 }),
                     para:0, cred:0, counter:0, tagline:0 },
          // t=4.40 — hold near minimal (the isolated grid pivots — see pivotRotation)
          { t: 4.40, w1: mk({ anchor:"C", ax:VW/2, y:300, size:60, a:0 }),
                     gA: mk({ x:VW/2-132, y:498, w:264, h:264, cols:2, rows:2, a:1 }),
                     w2: mk({ anchor:"C", ax:VW/2, y:300, size:60, a:0 }),
                     gB: mk({ x:VW/2-132, y:498, w:264, h:264, cols:2, rows:2, a:0 }),
                     para:0, cred:0, counter:0, tagline:0 },
          // t=5.00 — PORTRAIT: narrow centred column, SPECTER · grid · STUDIO · grid
          { t: 5.00, w1: mk({ anchor:"C", ax:VW/2, y:213, size:90, a:1 }),
                     gA: mk({ x:VW/2-195, y:235, w:390, h:265, cols:2, rows:2, a:1 }),
                     w2: mk({ anchor:"C", ax:VW/2, y:638, size:90, a:1 }),
                     gB: mk({ x:VW/2-195, y:660, w:390, h:265, cols:2, rows:2, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 },
          // t=5.72 — brief hold on portrait
          { t: 5.72, w1: mk({ anchor:"C", ax:VW/2, y:213, size:90, a:1 }),
                     gA: mk({ x:VW/2-195, y:235, w:390, h:265, cols:2, rows:2, a:1 }),
                     w2: mk({ anchor:"C", ax:VW/2, y:638, size:90, a:1 }),
                     gB: mk({ x:VW/2-195, y:660, w:390, h:265, cols:2, rows:2, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 },
          // t=6.50 — portrait widening (grids gain columns, move toward left)
          { t: 6.50, w1: mk({ anchor:"C", ax:VW/2-120, y:183, size:94, a:1 }),
                     gA: mk({ x:VW/2-330, y:205, w:660, h:245, cols:4, rows:2, a:1 }),
                     w2: mk({ anchor:"C", ax:VW/2-120, y:608, size:94, a:1 }),
                     gB: mk({ x:VW/2-330, y:630, w:660, h:245, cols:4, rows:2, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 },
          // t=7.30 — WIDE landscape again: 8-col grids, words spread L/R, no copy yet
          { t: 7.30, w1: mk({ anchor:"L", ax:M, y:183, size:100, a:1 }),
                     gA: mk({ x:M, y:205, w:VW-2*M, h:210, cols:8, rows:3, a:1 }),
                     w2: mk({ anchor:"R", ax:VW-M, y:603, size:100, a:1 }),
                     gB: mk({ x:M, y:625, w:VW-2*M, h:210, cols:8, rows:3, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 },
          // t=8.40 — grids narrow from the right, body copy begins to fade in
          { t: 8.40, w1: mk({ anchor:"L", ax:M, y:178, size:96, a:1 }),
                     gA: mk({ x:M, y:200, w:740, h:215, cols:5, rows:2, a:1 }),
                     w2: mk({ anchor:"L", ax:M, y:588, size:96, a:1 }),
                     gB: mk({ x:M, y:610, w:740, h:215, cols:5, rows:2, a:1 }),
                     para:0.32, cred:0.18, counter:1, tagline:1 },
          // t=9.00 — RESOLVED wide: left-aligned words, 3-col grids, body copy full
          { t: 9.00, w1: mk({ anchor:"L", ax:M, y:178, size:92, a:1 }),
                     gA: mk({ x:M, y:200, w:560, h:210, cols:3, rows:2, a:1 }),
                     w2: mk({ anchor:"L", ax:M, y:588, size:92, a:1 }),
                     gB: mk({ x:M, y:610, w:560, h:210, cols:3, rows:2, a:1 }),
                     para:1, cred:1, counter:1, tagline:1 },
          // t=9.80 — RESOLVED square: compact 2×2 blocks + paragraph (HOLD start)
          { t: 9.80, w1: mk({ anchor:"L", ax:M, y:183, size:92, a:1 }),
                     gA: mk({ x:M, y:205, w:300, h:300, cols:2, rows:2, a:1 }),
                     w2: mk({ anchor:"L", ax:M, y:678, size:92, a:1 }),
                     gB: mk({ x:M, y:700, w:300, h:300, cols:2, rows:2, a:1 }),
                     para:1, cred:1, counter:1, tagline:1 },
          // t=11.70 — identical → the dead-still ~1.9s hold
          { t: 11.70, w1: mk({ anchor:"L", ax:M, y:183, size:92, a:1 }),
                      gA: mk({ x:M, y:205, w:300, h:300, cols:2, rows:2, a:1 }),
                      w2: mk({ anchor:"L", ax:M, y:678, size:92, a:1 }),
                      gB: mk({ x:M, y:700, w:300, h:300, cols:2, rows:2, a:1 }),
                      para:1, cred:1, counter:1, tagline:1 },
          // t=12.40 — grids widen out again (loop wind-up)
          { t: 12.40, w1: mk({ anchor:"L", ax:M, y:173, size:92, a:1 }),
                      gA: mk({ x:M, y:195, w:700, h:250, cols:4, rows:3, a:1 }),
                      w2: mk({ anchor:"L", ax:M, y:608, size:92, a:1 }),
                      gB: mk({ x:M, y:630, w:700, h:250, cols:4, rows:3, a:1 }),
                      para:1, cred:1, counter:1, tagline:1 },
          // t=13.7167 — return to FORMAT A (seamless loop back to t=0)
          { t: DURATION, w1: mk({ anchor:"L", ax:M, y:183, size:100, a:1 }),
                     gA: mk({ x:M, y:205, w:VW-2*M, h:210, cols:10, rows:3, a:1 }),
                     w2: mk({ anchor:"R", ax:VW-M, y:603, size:100, a:1 }),
                     gB: mk({ x:M, y:625, w:VW-2*M, h:210, cols:10, rows:3, a:1 }),
                     para:0, cred:0, counter:1, tagline:1 }
        ];

        // Step 3 "pivot": the isolated 2×2 grid rotates 90° clockwise (passing through the
        // 45° diamond at the midpoint) and settles upright, while the type is faded out.
        function pivotRotation(t) {
          const t0 = 3.0, t1 = 4.3; // 45° diamond at the midpoint (~3.65s), upright by 4.3s
          if (t <= t0 || t >= t1) return 0;
          return easeInOut((t - t0) / (t1 - t0)) * (Math.PI / 2);
        }

        const canvas = document.getElementById("stage");
        const ctx = canvas.getContext("2d");
        let scale = 1, offX = 0, offY = 0, dpr = 1;

        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          const cw = window.innerWidth, ch = window.innerHeight;
          canvas.width = Math.round(cw * dpr);
          canvas.height = Math.round(ch * dpr);
          canvas.style.width = cw + "px";
          canvas.style.height = ch + "px";
          scale = Math.min(cw / VW, ch / VH);
          offX = (cw - VW * scale) / 2;
          offY = (ch - VH * scale) / 2;
        }
        window.addEventListener("resize", resize);
        resize();

        // Interpolate the full layout at loop-time t (seconds).
        function sample(t) {
          t = ((t % DURATION) + DURATION) % DURATION;
          let p = SCENES[0], q = SCENES[SCENES.length - 1];
          for (let i = 0; i < SCENES.length - 1; i++) {
            if (t >= SCENES[i].t && t <= SCENES[i + 1].t) { p = SCENES[i]; q = SCENES[i + 1]; break; }
          }
          const span = q.t - p.t || 1;
          const f = easeInOut(Math.max(0, Math.min(1, (t - p.t) / span)));
          const grid = (a, b) => ({
            x: lerp(a.x, b.x, f), y: lerp(a.y, b.y, f),
            w: lerp(a.w, b.w, f), h: lerp(a.h, b.h, f),
            cols: Math.max(1, Math.round(lerp(a.cols, b.cols, f))),
            rows: Math.max(1, Math.round(lerp(a.rows, b.rows, f))),
            a: lerp(a.a, b.a, f)
          });
          return {
            w1: { P: p.w1, Q: q.w1, f },
            w2: { P: p.w2, Q: q.w2, f },
            gA: grid(p.gA, q.gA),
            gB: grid(p.gB, q.gB),
            para: lerp(p.para, q.para, f),
            cred: lerp(p.cred, q.cred, f),
            counter: lerp(p.counter, q.counter, f),
            tagline: lerp(p.tagline, q.tagline, f)
          };
        }

        function wordLeft(w, size) {
          const width = ctx.measureText(w.text).width;
          if (w.anchor === "R") return w.ax - width;
          if (w.anchor === "C") return w.ax - width / 2;
          return w.ax;
        }

        function drawWord(spec, text) {
          const { P, Q, f } = spec;
          const a = lerp(P.a, Q.a, f);
          if (a <= 0.001) return;
          const size = lerp(P.size, Q.size, f);
          const y = lerp(P.y, Q.y, f);
          ctx.font = "700 " + size + 'px ' + FONT;
          const wP = ctx.measureText(text).width;
          const leftFor = (s) => s.anchor === "R" ? s.ax - wP : s.anchor === "C" ? s.ax - wP / 2 : s.ax;
          const left = lerp(leftFor(P), leftFor(Q), f);
          ctx.fillStyle = COL.word;
          ctx.globalAlpha = a;
          ctx.textBaseline = "alphabetic";
          ctx.textAlign = "left";
          ctx.fillText(text, left, y); // y is the text baseline (sits just above the grid)
          ctx.globalAlpha = 1;
        }

        function drawGrid(g, rot = 0) {
          if (g.a <= 0.001) return;
          ctx.save();
          if (rot) {
            const cx = g.x + g.w / 2, cy = g.y + g.h / 2;
            ctx.translate(cx, cy); ctx.rotate(rot); ctx.translate(-cx, -cy);
          }
          ctx.globalAlpha = g.a;
          ctx.strokeStyle = COL.line;
          ctx.lineWidth = 2;
          ctx.strokeRect(g.x, g.y, g.w, g.h);
          ctx.beginPath();
          for (let c = 1; c < g.cols; c++) {
            const x = g.x + (g.w * c) / g.cols;
            ctx.moveTo(x, g.y); ctx.lineTo(x, g.y + g.h);
          }
          for (let r = 1; r < g.rows; r++) {
            const y = g.y + (g.h * r) / g.rows;
            ctx.moveTo(g.x, y); ctx.lineTo(g.x + g.w, y);
          }
          ctx.strokeStyle = COL.lineSoft;
          ctx.stroke();
          ctx.restore();
        }

        function wrap(text, maxW, font) {
          ctx.font = font;
          const words = text.split(" ");
          const lines = [];
          let line = "";
          for (const w of words) {
            const test = line ? line + " " + w : w;
            if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
            else line = test;
          }
          if (line) lines.push(line);
          return lines;
        }

        function drawParagraph(alpha) {
          if (alpha <= 0.001) return;
          ctx.globalAlpha = alpha;
          const x = 920, top = 178, boxW = VW - x - M, size = 33, lh = size * 1.34;
          const font = "400 " + size + "px " + FONT;
          ctx.fillStyle = COL.body;
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          let y = top;
          for (const para of PARA) {
            for (const line of wrap(para, boxW, font)) {
              ctx.font = font;
              ctx.fillText(line, x, y);
              y += lh;
            }
            y += lh * 0.7; // paragraph gap
          }
          ctx.globalAlpha = 1;
        }

        function drawCredits(alpha) {
          if (alpha <= 0.001) return;
          ctx.globalAlpha = alpha;
          const x = 920, boxW = VW - x - M, size = 24, lh = size * 1.28;
          const font = "400 " + size + "px " + FONT;
          ctx.fillStyle = COL.muted;
          ctx.textAlign = "left";
          let y = VH - M - CREDITS.length * lh + lh - 6;
          for (const c of CREDITS) {
            for (const line of wrap(c, boxW, font)) {
              ctx.font = font;
              ctx.fillText(line, x, y);
              y += lh;
            }
          }
          ctx.globalAlpha = 1;
        }

        function drawCounter(alpha) {
          if (alpha <= 0.001) return;
          ctx.globalAlpha = alpha;
          ctx.font = "700 26px " + FONT;
          ctx.fillStyle = COL.accent; // violet accent tie-in
          ctx.textAlign = "right";
          ctx.textBaseline = "top";
          ctx.fillText(COUNTER, VW - M, M);
          ctx.globalAlpha = 1;
        }

        function drawTagline(alpha) {
          if (alpha <= 0.001) return;
          ctx.globalAlpha = alpha;
          ctx.font = "700 22px " + FONT;
          ctx.fillStyle = COL.muted;
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          let y = VH - M - (TAGLINE.length - 1) * 26;
          for (const t of TAGLINE) { ctx.fillText(t, M, y); y += 26; }
          ctx.globalAlpha = 1;
        }

        function renderFrame(t) {
          const cw = canvas.width, ch = canvas.height;
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, cw, ch);
          // background
          ctx.fillStyle = COL.bg;
          ctx.fillRect(0, 0, cw, ch);
          // violet radial glow (top-left) — subtle project accent
          ctx.save();
          const gx = cw * 0.12, gy = ch * 0.08, gr = Math.max(cw, ch) * 0.7;
          const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
          grad.addColorStop(0, COL.glow);
          grad.addColorStop(1, "rgba(124,58,237,0)");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, cw, ch);
          ctx.restore();

          // enter virtual space
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.translate(offX, offY);
          ctx.scale(scale, scale);

          const tl = ((t % DURATION) + DURATION) % DURATION;
          const s = sample(tl);
          drawGrid(s.gA, pivotRotation(tl));
          drawGrid(s.gB);
          drawWord(s.w1, WORD1);
          drawWord(s.w2, WORD2);
          drawParagraph(s.para);
          drawCredits(s.cred);
          drawCounter(s.counter);
          drawTagline(s.tagline);
        }

        // Deterministic hook for offline frame extraction / comparison.
        window.__renderAt = (t) => { window.__frozen = true; resize(); renderFrame(t); };

        // Reveal the waiting spinner. Called by the main process (via executeJavaScript) once the
        // splash has played its full round but the app is not ready to show yet.
        window.__splashHold = () => {
          const s = document.getElementById("spinner");
          if (s) s.style.opacity = "1";
        };

        // The splash plays exactly ONE round: from t=0 through to the resolved frame that shows the
        // app brief (HOLD_T), then freezes there. It never loops. The main process dissolves it once
        // the app is ready — which, per the launch contract, is never before this round completes.
        const HOLD_T = 11.70; // the resolved "brief" frame (SPECTER/STUDIO + grids + copy + credits)
        let start = null;
        function loop(now) {
          if (window.__frozen) return; // extraction hook owns the canvas
          if (start === null) start = now;
          const t = (now - start) / 1000;
          if (t >= HOLD_T) {
            renderFrame(HOLD_T);           // settle on the brief frame …
            window.__splashRoundComplete = true;
            return;                        // … and pause (stop the rAF loop)
          }
          renderFrame(t);
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
